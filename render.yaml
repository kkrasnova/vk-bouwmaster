services:
  - type: web
    name: vk-bouwmaster
    env: node
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /
    # Persistent disk is required if you want reviews/messages to survive restarts & deploys.
    disk:
      name: vk-bouwmaster-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      # Runtime storage paths (use Render persistent disk)
      - key: COMMENTS_FILE_PATH
        value: /var/data/comments-data.json
      - key: CONTACT_FILE_PATH
        value: /var/data/contact-data.json
      - key: CONTACT_MESSAGES_FILE_PATH
        value: /var/data/contact-messages.json
      # ВАЖНО: Добавьте следующие переменные окружения в настройках Render через веб-интерфейс:
      # Settings → Environment → Add Environment Variable
      # 
      # Для отправки email (опционально):
      # SMTP_HOST=your-smtp-host
      # SMTP_PORT=587
      # SMTP_USER=your-email
      # SMTP_PASS=your-password
      # RECIPIENT_EMAIL=your-recipient-email
      # EMAIL_TO тоже поддерживается, но лучше использовать RECIPIENT_EMAIL
      #
      # Для Telegram уведомлений (опционально):
      # TELEGRAM_BOT_TOKEN=123456:ABCDEF-your-token
      # TELEGRAM_CHAT_ID=123456789
      #
      # Для переводов (опционально):
      # OPENAI_API_KEY=your-openai-key
      #
      # Для загрузки файлов (опционально):
      # BLOB_READ_WRITE_TOKEN=your-blob-token

